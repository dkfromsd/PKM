<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey's Kitchen - Digital Brain Recipe</title>
    <script src="https://gobispace.com/gobi.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        :root {
            --bg-color: #fffaf0; /* Floral White */
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #8b4513; /* Wood brown */
            --secondary-color: #b8860b; /* Dark Goldenrod */
            --border-color: #e8dfd0;
            --soft-shadow: 0 10px 30px rgba(139, 69, 19, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(255, 250, 240, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
            gap: 20px;
            overflow-x: auto;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            background: none;
            padding: 5px 10px;
        }

        .nav-link:hover { color: var(--accent-color); }

        .lang-toggle {
            display: flex;
            gap: 5px;
            margin-left: 20px;
            border-left: 1px solid var(--border-color);
            padding-left: 20px;
        }

        .lang-btn {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 2px 8px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            color: #ccc;
            transition: all 0.3s;
        }

        .lang-btn.active {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: #fff4e6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        .kitchen-title {
            font-family: 'Cormorant+Garamond', serif;
            font-size: 4.5rem;
            color: var(--accent-color);
            margin: 0;
            font-style: italic;
            font-weight: 400;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            color: var(--accent-color);
            margin: 60px 0 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .recipe-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: var(--soft-shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            border: 1px solid transparent;
            display: flex; flex-direction: column;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(139, 69, 19, 0.1);
            border-color: var(--border-color);
        }

        .recipe-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            margin: 0 0 15px 0;
            line-height: 1.2;
        }

        .recipe-card .snippet {
            font-size: 0.95rem;
            color: #666;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .recipe-card .footer {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        /* Modal Viewer */
        #recipe-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fffaf0; /* Stable background */
            z-index: 2000;
            overflow-y: auto;
        }

        .viewer-inner {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 60px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            border-radius: 12px;
        }

        .close-btn {
            position: fixed;
            top: 20px; right: 30px;
            font-size: 2.5rem;
            cursor: pointer;
            color: var(--accent-color);
            background: none; border: none;
            z-index: 2100;
        }

        .markdown-content { font-family: 'Lora', serif; font-size: 1.1rem; color: #333; }
        .markdown-content h1, .markdown-content h2 { font-family: 'Cormorant Garamond', serif; color: var(--accent-color); }
        .markdown-content img { max-width: 100%; border-radius: 8px; }
        .markdown-content pre { background: #fdf6e3; padding: 20px; border-radius: 8px; overflow-x: auto; }

        /* Secret Debug Log */
        #debug-log {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9);
            color: #00ff00;
            font-family: monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div id="debug-log"></div>

<nav class="navbar">
    <div class="nav-inner" id="nav-inner">
        <button class="nav-link" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="nav-top">Top</button>
        <!-- Categories will be injected here -->
        <div class="lang-toggle">
            <button class="lang-btn" id="lang-ko" onclick="switchLanguage('ko')">KR</button>
            <button class="lang-btn" id="lang-en" onclick="switchLanguage('en')">EN</button>
        </div>
    </div>
</nav>

<div class="container">
    <header>
        <h1 class="kitchen-title">Mickey's Kitchen</h1>
        <p id="subtitle" style="letter-spacing: 2px; text-transform: uppercase; font-size: 0.75rem; color: var(--secondary-color); font-weight: 800;"></p>
    </header>

    <div id="kitchen-main">
        <p style="text-align: center; font-style: italic;" id="loading-msg"></p>
    </div>
</div>

<div id="recipe-viewer">
    <button class="close-btn" onclick="closeRecipe()">&times;</button>
    <div class="viewer-inner" id="viewer-content"></div>
</div>

<script>
    const categories = ['Stock', 'StockBot', 'Music', 'Health', 'Illustration', 'Thoughts', 'Study'];
    const logs = [];
    let vaultSlug = 'mickeyfromsd';
    let currentLang = 'ko';

    const i18n = {
        ko: {
            subtitle: "디지털 브레인 레시피 북 v3.9 (다국어 지원)",
            loading: "재료를 준비하는 중입니다...",
            top: "상단으로",
            viewRecipe: "레시피 보기 →",
            snippetPrefix: "Mickey의 인사이트를 확인하세요: ",
            recipeDetail: "레시피 상세",
            source: "출처",
            cookingComplete: "준비 완료.",
            chefAway: "셰프가 부재 중입니다. (SDK 오류)",
            plating: "레시피를 차리는 중: ",
            errorRead: "레시피를 읽는 중 오류가 발생했습니다. (파일 오류)",
            errorParse: "오류: 마크다운 파싱 실패",
            discover: "카테고리: "
        },
        en: {
            subtitle: "Digital Brain Recipe Book v3.9 (Multi-lingual)",
            loading: "Preparing the ingredients...",
            top: "Top",
            viewRecipe: "View Recipe →",
            snippetPrefix: "Discover Mickey's insights on ",
            recipeDetail: "Recipe Detail",
            source: "Source",
            cookingComplete: "COOKING COMPLETE.",
            chefAway: "Chef is away. (SDK Error)",
            plating: "Plating recipe: ",
            errorRead: "This recipe is still simmering. (File Error)",
            errorParse: "ERROR: Markdown parsing failed",
            discover: "Cuisine: "
        }
    };

    function log(msg) {
        const time = new Date().toLocaleTimeString();
        logs.push(`[${time}] ${msg}`);
        const panel = document.getElementById('debug-log');
        if (panel) {
            panel.innerHTML = logs.join('<br>');
            panel.scrollTop = panel.scrollHeight;
        }
        console.log(msg);
    }

    window.addEventListener('keydown', e => {
        if (e.key.toLowerCase() === 'l') {
            const panel = document.getElementById('debug-log');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }
    });

    function switchLanguage(lang) {
        currentLang = lang;
        document.getElementById('lang-ko').classList.toggle('active', lang === 'ko');
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        document.documentElement.lang = lang;

        applyStaticTranslations();
        if (window.gobi) startCooking();
    }

    function applyStaticTranslations() {
        const t = i18n[currentLang];
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('nav-top').innerText = t.top;
        const loadingMsg = document.getElementById('loading-msg');
        if (loadingMsg) loadingMsg.innerText = t.loading;
    }

    window.onload = async () => {
        switchLanguage('ko'); // Default to KR

        const pathParts = window.location.pathname.split('/');
        const urlSlug = pathParts.find(p => p.startsWith('@'))?.replace('@', '');
        if (urlSlug) {
            vaultSlug = urlSlug;
            log("Detected Vault Slug: " + vaultSlug);
        }

        let attempts = 0;
        const checkSDK = setInterval(async () => {
            attempts++;
            if (window.gobi) {
                clearInterval(checkSDK);
                if (!gobi.vaultId) { gobi.vaultId = vaultSlug; }
                log("SDK Ready. Vault: " + gobi.vaultId);
                await startCooking();
            } else if (attempts > 50) {
                clearInterval(checkSDK);
                log("FATAL: SDK Timeout.");
                document.getElementById('loading-msg').innerText = i18n[currentLang].chefAway;
            }
        }, 200);
    };

    let isCooking = false;
    async function startCooking() {
        if (isCooking) return;
        isCooking = true;

        try {
            const main = document.getElementById('kitchen-main');
            const nav = document.getElementById('nav-inner');
            const t = i18n[currentLang];

            // Update static text first
            applyStaticTranslations();

            // Clear and rebuild nav safely
            const topBtn = document.getElementById('nav-top');
            const langToggle = nav.querySelector('.lang-toggle');

            // Remove existing category buttons to prevent duplication
            const existingLinks = nav.querySelectorAll('.nav-link:not(#nav-top)');
            existingLinks.forEach(l => l.remove());

            // Temporary container to hold new buttons before re-attaching langToggle
            const fragment = document.createDocumentFragment();

            main.innerHTML = "";

            for (const cat of categories) {
                log(`Reading category: "${cat}"`);
                let recipes = [];
                const pathsToTry = [`../${cat}`, `./${cat}`, `/${cat}`, cat, `../../${cat}`, `@${vaultSlug}/${cat}`];

                for (const p of pathsToTry) {
                    try {
                        const res = await gobi.listFiles(p);
                        const list = Array.isArray(res) ? res : (res.data || res.results || []);
                        if (list.length > 0) {
                            recipes = list.filter(f => f.name.endsWith('.md') && f.name !== 'README.md');
                            break;
                        }
                    } catch (e) { }
                }

                if (recipes.length > 0) {
                    const btn = document.createElement('button');
                    btn.className = 'nav-link';
                    btn.innerText = cat;
                    btn.onclick = () => {
                        const target = document.getElementById(`section-${cat}`);
                        if (target) target.scrollIntoView({behavior: 'smooth'});
                    };
                    fragment.appendChild(btn);

                    const sec = document.createElement('section');
                    sec.id = `section-${cat}`;
                    sec.innerHTML = `<h2 class="section-title">${cat}</h2>`;
                    const grid = document.createElement('div');
                    grid.className = 'recipe-grid';

                    recipes.forEach(r => {
                        const card = document.createElement('div');
                        card.className = 'recipe-card';
                        card.onclick = () => openRecipe(cat, r.name);
                        card.innerHTML = `
                            <div style="font-size: 0.7rem; color: var(--secondary-color); font-weight: 800; text-transform: uppercase; margin-bottom: 10px;">${t.discover}${cat}</div>
                            <h3>${r.name.replace('.md', '')}</h3>
                            <div class="snippet">${t.snippetPrefix}${cat}...</div>
                            <div class="footer">
                                <span>${(r.size / 1024).toFixed(1)} KB</span>
                                <span>${t.viewRecipe}</span>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    sec.appendChild(grid);
                    main.appendChild(sec);
                }
            }

            // Add category buttons back to nav
            nav.insertBefore(fragment, langToggle);

            log(t.cookingComplete);
        } catch (err) {
            log("Cooking Error: " + err.message);
        } finally {
            isCooking = false;
        }
    }

    async function openRecipe(cat, fileName) {
        const t = i18n[currentLang];
        log(`${t.plating}${cat}/${fileName}`);
        const pathsToTry = [
            `../${cat}/${fileName}`, `./${cat}/${fileName}`, `/${cat}/${fileName}`,
            `${cat}/${fileName}`, `../../${cat}/${fileName}`, `@${vaultSlug}/${cat}/${fileName}`
        ];

        let rawData = null;
        let finalPath = "";

        for (const p of pathsToTry) {
            try {
                if (gobi.vault && gobi.vault.readFile) { rawData = await gobi.vault.readFile(p); }
                else if (gobi.vault && gobi.vault.getFileContent) { rawData = await gobi.vault.getFileContent(p); }
                else if (gobi.readFile) { rawData = await gobi.readFile(p); }

                if (rawData) {
                    finalPath = p;
                    break;
                }
            } catch (e) { }
        }

        if (!rawData) {
            alert(t.errorRead);
            return;
        }

        const content = (typeof rawData === 'object') ? (rawData.data || rawData.content || rawData.body || JSON.stringify(rawData)) : rawData;

        try {
            const html = marked.parse(content);
            const viewer = document.getElementById('recipe-viewer');
            const contentArea = document.getElementById('viewer-content');

            contentArea.innerHTML = `
                <div style="font-family: 'Cormorant Garamond'; text-align: center; margin-bottom: 40px;">
                    <div style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; color: var(--secondary-color); font-weight: 800; margin-bottom: 10px;">${t.recipeDetail}</div>
                    <h1 style="font-size: 3.5rem; margin: 0; font-style: italic;">${fileName.replace('.md', '')}</h1>
                    <div style="font-size: 0.7rem; color: #ccc; margin-top: 10px;">${t.source}: ${finalPath}</div>
                </div>
                <div class="markdown-content">${html}</div>
            `;
            viewer.style.display = 'block';
            document.body.style.overflow = 'hidden';
            viewer.scrollTop = 0;
        } catch (e) {
            log(t.errorParse);
        }
    }

    function closeRecipe() {
        document.getElementById('recipe-viewer').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
<!-- v3.9.1 Fixed isCooking ReferenceError: Sun Apr 19 2026 -->
</html>
<!-- v3.9 Multi-lingual Support: Sat Apr 18 2026 -->
