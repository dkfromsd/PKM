<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Trend Stock Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">AI-Trend Stock Tracker</h1>
            <p class="text-slate-500">Real-time trending tickers analyzed by AI Agents</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Mentions Chart -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-semibold mb-4 text-slate-700">Trending Mentions</h2>
                <canvas id="mentionsChart"></canvas>
            </div>

            <!-- Sentiment Chart -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-semibold mb-4 text-slate-700">Sentiment Score</h2>
                <canvas id="sentimentChart"></canvas>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-semibold mb-4 text-slate-700">Raw Data Feed</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-slate-100 text-slate-400 text-sm uppercase tracking-wider">
                            <th class="pb-4 font-semibold">Ticker</th>
                            <th class="pb-4 font-semibold">Sector</th>
                            <th class="pb-4 font-semibold">Source</th>
                            <th class="pb-4 font-semibold">Mentions</th>
                            <th class="pb-4 font-semibold">Sentiment</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="text-slate-600">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const response = await fetch('/api/v1/trends');
            const result = await response.json();
            const data = result.data;

            // Update Table
            const tableBody = document.getElementById('dataTable');
            data.forEach(item => {
                const row = `
                    <tr class="border-b border-slate-50">
                        <td class="py-4 font-bold text-slate-800">${item.ticker}</td>
                        <td class="py-4">${item.sector}</td>
                        <td class="py-4"><span class="px-2 py-1 bg-blue-50 text-blue-600 rounded-md text-xs font-semibold">${item.source}</span></td>
                        <td class="py-4">${item.mentions}</td>
                        <td class="py-4 font-mono">${item.sentiment}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            // Mentions Chart
            new Chart(document.getElementById('mentionsChart'), {
                type: 'bar',
                data: {
                    labels: data.map(d => d.ticker),
                    datasets: [{
                        label: 'Number of Mentions',
                        data: data.map(d => d.mentions),
                        backgroundColor: '#3b82f6',
                        borderRadius: 8
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            // Sentiment Chart
            new Chart(document.getElementById('sentimentChart'), {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.ticker),
                    datasets: [{
                        data: data.map(d => d.sentiment * 100),
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#6366f1']
                    }]
                }
            });
        }

        fetchData();
    </script>
</body>
</html>
